# Interface Signals
about_program_description: "<b>Soul of Waifu</b> — is a powerful and feature-rich platform for interacting with AI-driven characters. It combines ease of use with deep customization, making the application suitable for both beginners and advanced users.<br><br>Take the unique opportunity to create your own characters from scratch, or import ready-made character cards in the V2 format. Customize their personality, habits, behavior, voice, appearance, and even the world they inhabit using the lorebook system. The app supports all popular LLM platforms: Character AI, Mistral AI, OpenAI, proxies, and OpenRouter — or you can load your own local language model in GGUF format directly into Soul of Waifu.<br><br>If you want to deepen your interaction with a character, enable the Soul of Waifu System mode. This unlocks advanced features that elevate your experience. Call your character, assign them an avatar, optimize context handling with the built-in smart memory feature, and feel a deeper emotional connection — your character will react to your messages with a dynamic emotion system. Their facial expression, pose, and animation will change in real time, reflecting their emotional state in the conversation.<br><br>Manage everything in one place: create characters in the full-featured editor, discover and add new ones in the Characters Gateway, manage and download local language models in the Models Hub, create user personas, lorebooks, prompt presets, and much more!"
about_program_sub_description: "If you encounter an error or have an idea to improve the app, don't hesitate to join our <a href='https://discord.gg/6vFtQGVfxM'>Discord server</a>! There, fellow enthusiasts share their experiences, exchange character cards, and discuss exciting topics. Your involvement directly shapes the future of the project. Together, we're building a place where dreams come to life!"
